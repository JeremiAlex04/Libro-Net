#Configuracion y Conexión a la base de datos para el microservicio de préstamos
server:
  port: 8081 # Este microservicio corre en su propio puerto

spring:
  application:
    name: libronet-prestamos
  datasource:
    url: jdbc:postgresql://localhost:5432/biblioteca_db
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Crea las tablas automáticamente
    show-sql: true # Para ver en consola el SELECT FOR UPDATE

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    metadata-map:
      sede: Sede Norte
      nodeId: 1

eleccion:
  node-id: 1
  node-name: Sede Norte

reloj:
  drift-ms: 0