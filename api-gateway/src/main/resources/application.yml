server:
  port: 8080

spring:
  application:
    name: libronet-api-gateway
  cloud:
    gateway:
      routes:
        # 1. Ruta hacia el nuevo Servicio de Catálogo (Búsquedas)
        - id: catalogo-service
          uri: lb://libronet-catalogo
          predicates:
            - Path=/api/catalogo/**
            
        # 2. Ruta hacia el Servicio de Préstamos (Transacciones)
        - id: prestamos-service
          uri: lb://libronet-prestamos
          predicates:
            - Path=/api/prestamos/**

        # 3. Ruta hacia el Módulo de Simulación Académica (Dekker)
        - id: simulacion-service
          uri: lb://libronet-prestamos
          predicates:
            - Path=/api/simulacion/**
            
      # Reglas de seguridad para permitir que React se comunique
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - OPTIONS
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true